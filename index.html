<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyCampus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#F7F8FA;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border:1px solid #EAECF0;border-radius:20px;padding:44px 48px;width:100%;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.12)}
.brand{font-family:'Nunito',Arial,sans-serif;font-size:32px;font-weight:900;color:#1D4ED8;letter-spacing:-.02em;text-align:center;margin-bottom:4px}
label{display:block;font-size:11px;font-weight:600;color:#667085;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
input,select{width:100%;font-size:14px;padding:10px 13px;border:1px solid #D0D5DD;border-radius:10px;background:#fff;color:#101828;font-family:inherit;outline:none;margin-bottom:14px}
input:focus,select:focus{border-color:#1D4ED8;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.btn{width:100%;padding:11px;border-radius:10px;border:none;background:#1D4ED8;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:4px;transition:background .15s}
.btn:hover{background:#1e40af}
.err{font-size:12px;color:#F04438;text-align:center;margin-top:10px;min-height:18px}
.lnk{color:#1D4ED8;text-decoration:none;font-weight:500;cursor:pointer;background:none;border:none;font-family:inherit;font-size:12px}
.toggle{font-size:12px;color:#667085;text-align:center;margin-top:16px}
.sub{font-size:13px;color:#667085;text-align:center;margin-bottom:20px}
.back{display:flex;align-items:center;gap:6px;background:none;border:none;color:#667085;font-size:12px;cursor:pointer;font-family:inherit;margin-bottom:18px;padding:0}
</style>
</head>

async function doSignUp(){
