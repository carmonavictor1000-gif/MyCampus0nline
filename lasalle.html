<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<title>MyCampus — MBT La Salle</title>

<style>
:root{
  --bg:#F7F8FA;--white:#FFFFFF;--border:#EAECF0;--border2:#D0D5DD;
  --text:#101828;--sub:#667085;--sub2:#98A2B3;
  --accent:#111827;--accent-h:#374151;
  --green:#12B76A;--green-bg:#ECFDF3;--green-text:#027A48;
  --red:#F04438;--red-bg:#FEF3F2;--red-text:#B42318;
  --amber:#F79009;--amber-bg:#FFFAEB;--amber-text:#B54708;
  --blue:#2E90FA;--blue-bg:#EFF8FF;--blue-text:#175CD3;
  --radius:12px;--radius-sm:8px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
  --shadow-sm:0 1px 2px rgba(16,24,40,.05);
  --shadow:0 1px 3px rgba(16,24,40,.1),0 1px 2px rgba(16,24,40,.06);
  --shadow-md:0 4px 8px -2px rgba(16,24,40,.1),0 2px 4px -2px rgba(16,24,40,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased}
.layout{display:flex;height:100vh;overflow:hidden}

/* Sidebar */
.sidebar{
  width:80px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:14px 0;gap:2px;z-index:10;box-shadow:var(--shadow-sm);
  transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden;
  height:100vh;
}
.sidebar.expanded{width:220px;align-items:flex-start}
.sidebar.expanded .nav{width:calc(100% - 16px);margin:0 8px;justify-content:flex-start;gap:10px;padding:0 10px;border-radius:10px}
.sidebar.expanded .nav .nav-label{display:inline;font-size:13px;font-weight:500;white-space:nowrap}
.sidebar.expanded a.nav{width:calc(100% - 16px);margin:0 8px;justify-content:flex-start;gap:10px;padding:0 10px;border-radius:10px}
.sidebar.expanded .sb-logo-wrap{padding-left:14px;justify-content:flex-start}
.sidebar.expanded .sb-brand{display:flex;align-items:center;gap:8px}
.sidebar:not(.expanded) #year-switcher{font-size:9px;padding:4px 2px;text-align:center}
.sidebar.expanded .sb-brand-text{display:block;font-size:15px;font-weight:800;color:#1D4ED8;letter-spacing:-.02em;font-family:var(--font)}
.sidebar.expanded .sb-div{width:calc(100% - 28px);margin:6px 14px}
.sidebar.expanded .sb-bot{width:100%;padding:0 8px;align-items:flex-start}
.sidebar.expanded .avatar{margin-left:10px}
.nav-label{display:none}
.sb-brand-text{display:none}
.sb-logo-wrap{display:flex;align-items:center;justify-content:center;width:100%;margin-bottom:18px;cursor:pointer;flex-shrink:0}
.sb-toggle{position:absolute;right:-10px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;background:var(--white);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);z-index:11}
.sidebar-wrap{position:relative;flex-shrink:0;height:100vh}

.sb-div{width:28px;height:1px;background:var(--border);margin:6px 0}
.sb-bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:4px}
.nav{width:42px;height:42px;border-radius:11px;border:none;background:transparent;color:#C0C5D0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;position:relative}
.nav:hover{background:var(--bg);color:#667085}
.nav.active{background:#1D4ED8;color:#fff;box-shadow:var(--shadow-sm)}
.nav.active svg{stroke:#fff !important;fill:currentColor}
.nav .tip{position:absolute;left:54px;top:50%;transform:translateY(-50%);background:var(--text);color:#fff;font-size:11px;font-weight:500;padding:5px 10px;border-radius:7px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:100;box-shadow:var(--shadow)}
.nav .tip::before{content:'';position:absolute;left:-4px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:4px solid transparent;border-bottom:4px solid transparent;border-right:4px solid var(--text)}
.nav:hover .tip{opacity:1}
.sidebar.expanded .nav:hover .tip{opacity:0;pointer-events:none}
a.nav{display:flex;align-items:center;justify-content:center;text-decoration:none;color:#C0C5D0}
a.nav:hover{color:#667085;background:var(--bg)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;margin-top:4px;box-shadow:var(--shadow-sm);cursor:pointer}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.main::-webkit-scrollbar{width:4px}
.main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* Topbar */
.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:9;box-shadow:var(--shadow-sm);transition:opacity .15s}
.topbar.hidden{display:none}
.tb-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;color:var(--sub)}
.tb-title strong{color:var(--text);font-weight:600}

/* Content */
.content-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-height:0}
.content-scroll:has(#panel-overview.active){overflow:hidden}
.content{padding:16px 20px 16px}

/* Panels */
.panel{display:none}.panel.active{display:block}
#panel-overview.active{display:flex;flex-direction:column;height:calc(100vh - 32px)}

/* Overview layout */
.ov-layout{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:14px;flex:1;min-height:0}

/* Stat cards */
.ov-stat-card{flex:1;background:var(--accent,#8B5CF6);border-radius:16px;padding:28px 28px 24px;position:relative;overflow:hidden;border:1px solid rgba(0,0,0,.12);box-shadow:0 8px 24px rgba(0,0,0,.18),inset 0 1px 0 rgba(255,255,255,.15);display:flex;flex-direction:column;justify-content:flex-end}
.ov-sc-deco{position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}
.ov-sc-deco::after{content:'';position:absolute;bottom:-60px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(0,0,0,.06)}
.ov-sc-label{font-size:11px;font-weight:600;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.ov-sc-num{font-size:52px;font-weight:800;color:#fff;letter-spacing:-.06em;line-height:1;font-variant-numeric:tabular-nums}
.ov-sc-sub{font-size:12px;color:rgba(255,255,255,.65);margin-top:4px;font-weight:400}

/* Actividades card */
.ov-act-card{flex:1;background:var(--white);border-radius:16px;border:1px solid #E0E0E0;box-shadow:0 8px 32px rgba(0,0,0,.14),0 2px 8px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden}
.ov-act-head{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
.ov-act-title{font-size:12px;font-weight:700;color:var(--text);letter-spacing:-.01em}
.ov-act-body{flex:1;overflow:hidden;display:flex;flex-direction:column;padding:0}
.ov-act-body::-webkit-scrollbar{width:3px}
.ov-act-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Bottom quick links */
.ov-bottom{display:flex;gap:10px;align-items:center;padding:10px 0 4px;flex-shrink:0}
.ov-link{flex:1;display:flex;align-items:center;gap:9px;background:var(--white);border:1px solid #D8D8D8;border-radius:12px;padding:10px 13px;text-decoration:none;color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,.12),0 1px 3px rgba(0,0,0,.06);transition:all .15s;font-size:12px;font-weight:500}
.ov-link:hover{box-shadow:0 6px 18px rgba(0,0,0,.18);transform:translateY(-1px)}
.ov-link i.fa-arrow-up-right-from-square{margin-left:auto}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:var(--shadow-sm);transition:box-shadow .15s}
.card:hover{box-shadow:var(--shadow)}
.card-h{padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-h h2{font-size:12px;font-weight:600;display:flex;align-items:center;gap:7px;color:var(--sub);text-transform:uppercase;letter-spacing:.06em}
.card-b{padding:14px 16px}
.card-f{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:center}

/* Stat cards (section) */
.sc{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--sc-color,var(--border))}
.sc .sv{font-size:26px;font-weight:800;letter-spacing:-.05em;font-variant-numeric:tabular-nums;margin-top:4px}
.sc .sl{font-size:10px;color:var(--sub);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-top:5px}

/* Item rows */
.ilist{display:flex;flex-direction:column;gap:0}
.irow{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-sm);transition:background .1s;border-left:3px solid transparent;position:relative}
.irow:hover{background:var(--bg)}
.irow+.irow{border-top:1px solid var(--border)}
.ii{flex:1;min-width:0}
.in{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.is{font-size:11px;color:var(--sub2);margin-top:1px}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:.02em;white-space:nowrap}
.b-pend{background:var(--amber-bg);color:var(--amber-text)}
.b-done{background:var(--green-bg);color:var(--green-text)}
.b-curso{background:var(--blue-bg);color:var(--blue-text)}
.b-nins{background:#F2F4F7;color:var(--sub)}
.b-ins{background:var(--amber-bg);color:var(--amber-text)}
.b-real{background:var(--green-bg);color:var(--green-text)}
.b-ap{background:var(--green-bg);color:var(--green-text)}
.b-susp{background:var(--red-bg);color:var(--red-text)}
.asig-apr{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--green-bg);color:var(--green-text)}
.asig-pend{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;background:#F2F4F7;color:var(--sub)}

/* Bubble */
.bubble{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;border:2px solid}

/* FAB */
.fab{position:fixed;bottom:28px;right:28px;width:44px;height:44px;border-radius:12px;background:var(--white);color:var(--text);border:1.5px solid var(--border2);cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.12);transition:all .15s;z-index:52;font-family:var(--font)}
.fab:hover{box-shadow:0 6px 20px rgba(0,0,0,.18);transform:translateY(-1px);border-color:var(--text)}
.fab.visible{display:flex}

/* Drawer */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:60;display:none;backdrop-filter:blur(2px)}
.drawer-overlay.open{display:block}
.drawer{position:fixed;bottom:0;left:var(--sb-w,80px);right:0;background:var(--white);border-top:1px solid var(--border);border-radius:16px 16px 0 0;z-index:61;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,0,.67,0);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
.drawer.open{transform:translateY(0);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.drawer-head{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 12px;border-bottom:1px solid var(--border)}
.drawer-head h3{font-size:15px;font-weight:700;letter-spacing:-.02em}
.drawer-close{width:28px;height:28px;border-radius:8px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--sub);font-family:var(--font)}
.drawer-body{padding:20px 24px 28px;display:flex;flex-direction:column;gap:12px}

/* Forms */
.qf-lbl{font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid transparent;background:var(--bg);color:var(--sub);transition:all .12s;font-family:var(--font)}
.pill:hover{color:var(--text);border-color:var(--border2)}
.pill.sel{color:#fff}
.pd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fg{display:grid;gap:8px}
.c1{grid-template-columns:1fr}.c2{grid-template-columns:1fr 1fr}.c3{grid-template-columns:1fr 1fr 1fr}
input,select,textarea{width:100%;font-size:13px;padding:8px 11px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--white);color:var(--text);font-family:var(--font);outline:none;transition:border .15s;box-shadow:var(--shadow-sm)}
input:focus,select:focus,textarea:focus{border-color:var(--text);box-shadow:0 0 0 3px rgba(0,0,0,.06)}
textarea{resize:vertical;min-height:56px}
.fa-row{display:flex;gap:8px;align-items:center;margin-top:4px}
.hint{font-size:11px;color:var(--sub2);flex:1}
.btn-prim{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;background:var(--text);color:#fff;font-family:var(--font);transition:all .15s;box-shadow:var(--shadow-sm)}
.btn-prim:hover{background:var(--accent-h);box-shadow:var(--shadow)}
.btn-view{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);transition:all .15s}
.btn-view:hover{background:var(--bg);border-color:var(--text)}
.del{padding:4px 7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--sub2);cursor:pointer;font-size:11px;transition:all .15s;flex-shrink:0}
.del:hover{color:var(--red);border-color:#FECDCA;background:var(--red-bg)}

/* Grade inline */
.grade-inline{display:flex;align-items:center;gap:5px;flex-shrink:0}
.grade-inline input{width:60px;font-size:12px;padding:4px 7px;border:1px solid var(--border2);border-radius:6px;background:var(--bg);text-align:center;box-shadow:none}
.grade-inline input:focus{border-color:var(--text);box-shadow:none}
.grade-inline .btn-n{padding:4px 9px;border-radius:6px;border:none;background:var(--text);color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:var(--font)}
.grade-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}

/* Section header */
.sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-h h2{font-size:18px;font-weight:800;letter-spacing:-.04em}

/* Quick links */
.quicklink{display:flex;align-items:center;gap:11px;padding:11px 13px;border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);transition:all .15s;background:var(--white);box-shadow:var(--shadow-sm)}
.quicklink:hover{border-color:var(--border2);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.ql-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.ql-text{flex:1;min-width:0}
.ql-title{font-size:12px;font-weight:600}
.ql-sub{font-size:10px;color:var(--sub);margin-top:1px}
.ql-arr{font-size:10px;color:var(--sub2);flex-shrink:0}



.nsv{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.04em}
.nsl{font-size:10px;color:var(--sub);margin-top:3px;text-transform:uppercase;letter-spacing:.07em;font-weight:500}

/* Empty */
.empty{text-align:center;padding:24px 16px;color:var(--sub2);font-size:12px}
.empty i{font-size:22px;display:block;margin-bottom:6px;opacity:.3}

/* Item grid */
.igrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;padding:2px;align-items:stretch}
.gcard{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px;position:relative;cursor:default;transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column}
.gcard:hover{transform:translateY(-2px)}
.gcard .gc-asig{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.gcard .gc-name{font-size:13px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;line-height:1.3;word-break:break-word;overflow-wrap:break-word}
.gcard .gc-meta{font-size:11px;color:var(--sub);margin-bottom:10px}
.gcard .gc-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:8px}
.gcard .gc-grade{font-size:20px;font-weight:800;letter-spacing:-.04em;font-variant-numeric:tabular-nums}
.gc-edit{background:var(--bg);border-radius:10px;padding:10px;margin-top:10px;display:none}
.gc-edit.open{display:block}
.gc-edit .fg{gap:6px;margin-bottom:8px}

/* Kebab */
.kebab-wrap{position:relative;flex-shrink:0}
.kebab{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub2);transition:all .15s;flex-shrink:0}
.kebab:hover{background:var(--bg);color:var(--text);border-color:var(--border2)}
.kebab i{font-size:13px;pointer-events:none}
.kmenu{position:absolute;right:0;top:34px;background:var(--white);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow-md);z-index:200;min-width:140px;overflow:hidden;display:none}
.kmenu.open{display:block}
.kmenu-item{display:flex;align-items:center;gap:9px;padding:9px 13px;font-size:12px;font-weight:500;cursor:pointer;color:var(--text);border:none;background:none;width:100%;text-align:left;font-family:var(--font);transition:background .1s}
.kmenu-item:hover{background:var(--bg)}
.kmenu-item.danger{color:var(--red)}
.kmenu-item.danger:hover{background:var(--red-bg)}
.kmenu-item i{font-size:12px;width:14px;text-align:center;color:var(--sub2)}
.kmenu-item.danger i{color:var(--red)}
.kmenu-div{height:1px;background:var(--border);margin:3px 0}
.edit-row{background:var(--bg);border-radius:8px;padding:10px 12px;margin:6px 0;display:none}
.edit-row.open{display:block}
.edit-row .fg{gap:6px;margin-bottom:6px}

/* Study Route */
.sr-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:4px 2px;align-items:start}
.sr-year{background:var(--white);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.08)}
.sr-year-head{padding:16px 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sr-year-title{font-size:15px;font-weight:800;letter-spacing:-.03em}
.sr-year-ec{font-size:13px;font-weight:600;color:var(--sub)}
.sr-sem{padding:12px 14px 4px}
.sr-sem-label{font-size:10px;font-weight:700;color:var(--sub2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sr-course{display:flex;align-items:stretch;gap:0;background:linear-gradient(135deg,#EFF6FF 0%,#F8FAFF 100%);border:1px solid #DBEAFE;border-radius:10px;margin-bottom:7px;overflow:hidden}
.sr-course-bar{width:4px;flex-shrink:0}
.sr-course-body{padding:9px 12px;flex:1;min-width:0}
.sr-course-name{font-size:13px;font-weight:700;letter-spacing:-.01em;color:var(--text);line-height:1.3}
.sr-course-ec{font-size:11px;color:var(--sub);margin-top:3px}
.sr-course-grade{font-size:12px;font-weight:700;margin-top:4px}



/* ── Profile panel ── */
.profile-panel{
  position:fixed;bottom:70px;left:16px;width:280px;
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);
  z-index:500;display:none;overflow:hidden;
}
.profile-panel.open{display:block}
.profile-head{
  padding:16px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.profile-avatar{
  width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;flex-shrink:0;
}
.profile-email{font-size:11px;color:var(--sub);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-name-head{font-size:13px;font-weight:600}
.profile-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto}
.profile-field label{display:block;font-size:10px;font-weight:600;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.profile-field input,.profile-field select{font-size:12px;padding:7px 9px;border:1px solid var(--border2);border-radius:8px;background:var(--bg)}
.profile-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
.profile-save{flex:1;padding:7px;border-radius:8px;border:none;background:var(--text);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font)}
.profile-save:hover{background:var(--accent-h)}
.profile-logout{padding:7px 12px;border-radius:8px;border:1px solid var(--border2);background:none;color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font)}
.profile-logout:hover{color:var(--red);border-color:#FECDCA;background:var(--red-bg)}


/* ── Mobile responsive ── */
@media (max-width: 768px) {
  /* Kill sidebar completely */
  .sidebar-wrap { display: none !important; }
  
  /* Full width layout */
  .layout { flex-direction: column; height: 100vh; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; }
  
  /* Topbar */
  .topbar { height: 50px; padding: 0 14px; position: sticky; top: 0; z-index: 9; }
  .topbar.hidden { display: none !important; }

  /* Content */
  .content-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .content { padding: 12px 12px 80px; }

  /* Overview */
  #panel-overview.active { 
    height: calc(100dvh - 50px - 66px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .ov-layout { 
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 10px;
    height: auto;
    flex: unset;
  }
  .ov-left { flex-direction: column; gap: 10px; grid-column: 1; }
  .ov-right { grid-column: 2; grid-row: 1; }
  .ov-stat-card { padding: 16px 14px; flex: unset; }
  .ov-sc-num { font-size: 32px; }
  .ov-sc-label { font-size: 9px; }
  .ov-bottom { 
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    padding: 8px 0 4px;
  }
  .ov-link { 
    flex-direction: column; 
    align-items: center; 
    padding: 8px 4px;
    gap: 4px;
    font-size: 9px;
    border-radius: 10px;
  }
  .ov-link .ql-icon { width: 26px; height: 26px; font-size: 12px; }
  .ov-link i { margin-left: 0 !important; display: none; }

  /* Cards grid */
  .igrid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .gcard { padding: 12px; }
  .gcard .gc-name { font-size: 12px; }

  /* Study route */
  .sr-grid { grid-template-columns: 1fr; }

  /* Drawer */
  .drawer { left: 0 !important; border-radius: 20px 20px 0 0; }

  /* FAB */
  .fab { bottom: 76px; right: 14px; width: 40px; height: 40px; }

  /* Profile panel */
  .profile-panel { bottom: 76px; left: 10px; right: 10px; width: auto; max-height: 70vh; overflow-y: auto; }

  /* Sync */
  #sync-status { top: auto; bottom: 76px; right: 10px; font-size: 10px; }
}

/* ── Bottom nav (mobile only) ── */
.mobile-nav { display: none; }
@media (max-width: 768px) {
  .mobile-nav {
    display: flex;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 66px;
    background: var(--white);
    border-top: 1px solid var(--border);
    z-index: 100;
    align-items: center;
    justify-content: space-around;
    padding: 0 6px env(safe-area-inset-bottom);
    box-shadow: 0 -2px 16px rgba(0,0,0,.07);
  }
  .mob-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    flex: 1;
    padding: 5px 2px;
    border: none;
    background: none;
    cursor: pointer;
    color: #C0C5D0;
    font-family: var(--font);
    border-radius: 10px;
    text-decoration: none;
    transition: color .15s;
  }
  .mob-btn svg { width: 22px; height: 22px; stroke: currentColor; }
  .mob-btn span { font-size: 9px; font-weight: 600; }
  .mob-btn.active { color: #1D4ED8; }
}
}



/* ── Mobile ── */
@media (max-width: 768px) {
  /* Hide desktop sidebar completely */
  .sidebar-wrap { display: none !important; }
  
  /* Layout stacks vertically */
  .layout { flex-direction: column; height: 100vh; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  
  /* Topbar */
  .topbar { height: 48px; padding: 0 14px; flex-shrink: 0; }
  .topbar.hidden { display: flex !important; } /* always show on mobile */
  
  /* Scrollable content area */
  .content-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .content { padding: 12px 12px 80px; }

  /* Overview: single column */
  #panel-overview.active { 
    height: auto;
    display: block;
  }
  .ov-layout { 
    display: flex;
    flex-direction: column;
    gap: 10px;
    height: auto;
  }
  .ov-left { 
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    min-height: unset;
  }
  .ov-stat-card { 
    padding: 16px 14px 14px;
    border-radius: 14px;
  }
  .ov-sc-num { font-size: 30px; }
  .ov-sc-label { font-size: 9px; margin-bottom: 4px; }
  .ov-sc-sub { font-size: 10px; }
  .ov-right { min-height: 200px; }
  .ov-act-card { border-radius: 14px; }
  .ov-bottom { 
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 8px 0 0;
  }
  .ov-link { 
    padding: 10px 10px;
    border-radius: 12px;
    font-size: 11px;
    gap: 8px;
  }

  /* Cards grid */
  .igrid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .gcard { padding: 12px; }
  .gcard .gc-name { font-size: 12px; }
  .gcard .gc-grade { font-size: 16px; }

  /* Study route: single column */
  .sr-grid { grid-template-columns: 1fr; }

  /* Drawer full width */
  .drawer { left: 0; right: 0; border-radius: 20px 20px 0 0; }
  .drawer-body { padding: 16px 16px 40px; gap: 10px; }

  /* FAB */
  .fab { bottom: 76px; right: 16px; width: 48px; height: 48px; }

  /* Profile panel */
  .profile-panel { 
    bottom: 76px;
    left: 10px;
    right: 10px;
    width: auto;
    max-height: 70vh;
    overflow-y: auto;
  }

  /* Sync status */
  #sync-status { font-size: 10px; top: auto; bottom: 80px; right: 70px; }

  /* Login full screen */
}

  .mobile-nav {
    display: flex;
    position: fixed;

    gap: 3px;
    flex: 1;

    border: none;

    cursor: pointer;

    font-family: var(--font);
    border-radius: 10px;
    transition: all .15s;
    text-decoration: none;

.icon{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle}
.nav svg{stroke:currentColor;transition:stroke .15s}
.nav.active svg{stroke:#fff}
.nav svg path,.nav svg circle,.nav svg line,.nav svg polyline,.nav svg rect{stroke:currentColor}
.nav.active svg path,.nav.active svg circle,.nav.active svg line,.nav.active svg polyline,.nav.active svg rect{stroke:#fff}

/* ── FAB menu ── */
.fab-menu{
  position:fixed;bottom:80px;right:28px;
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.15);
  z-index:51;display:none;overflow:hidden;min-width:140px;
}
.fab-menu.open{display:block}
.fab-item{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:11px 16px;
  border:none;background:none;cursor:pointer;
  font-size:13px;font-weight:500;color:var(--text);
  font-family:var(--font);text-align:left;
  transition:background .1s;
}
.fab-item:hover{background:var(--bg)}
.fab-item svg{color:var(--sub);flex-shrink:0}
.fab-item.danger{color:var(--red)}
.fab-item.danger svg{color:var(--red)}
.fab-item-div{height:1px;background:var(--border);margin:3px 0}


.gcard.selected{box-shadow:0 0 0 2px #1D4ED8, 0 4px 16px rgba(29,78,216,.2) !important;border-color:#1D4ED8 !important}

/* Toast */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;font-size:12px;font-weight:500;padding:9px 18px;border-radius:20px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:var(--shadow-md);white-space:nowrap}

// Check if biometric is available and email is saved

async function doBiometric(){
  const email=getSavedEmail();
  if(!email){showToast('Inicia sesión primero');return;}
  const btn=document.getElementById('biometric-btn');
  btn.disabled=true;
  try{
    // Use platform authenticator (Face ID / Touch ID) to verify identity
    const challenge=new Uint8Array(32);
    crypto.getRandomValues(challenge);
    const credential=await navigator.credentials.get({
      publicKey:{
        challenge,
        timeout:60000,
        userVerification:'required',
        rpId:window.location.hostname,
      }
    });
    if(credential){
      // Biometric verified — try to restore session
      const {data:{session}}=await sbClient.auth.getSession();
      if(session){
        onLogin(session);
      } else {
        // Session expired — ask for password once
        const lerr=document.getElementById('login-err');if(lerr)lerr.textContent='Session expired, enter your password.';
        btn.disabled=false;
      }
    }
  }catch(e){
    // User cancelled or not enrolled — fall back to password
    btn.disabled=false;
    if(e.name!=='NotAllowedError') console.warn('Biometric error:',e);
  }
}

// Sync status indicator
function setSyncStatus(status){
  const el=document.getElementById('sync-status');
  if(!el||!document.body)return;
  if(status==='saving'){el.textContent='↑ Saving...';el.style.color='#F59E0B';}
  else if(status==='ok'){el.textContent='✓ Synced';el.style.color='#12B76A';setTimeout(()=>{el.textContent='';},2000);}
  else if(status==='error'){el.textContent='✗ Error';el.style.color='#F04438';}
}

// Save using Supabase JS SDK (handles auth automatically)
let _saveTimer=null;
function save(){
  clearTimeout(_saveTimer);
  setSyncStatus('saving');
  _saveTimer=setTimeout(async()=>{
    if(!currentUser){setSyncStatus('error');return;}
    const payload={
      id:currentUser.id,
      user_id:currentUser.id,
      tareas,examenes,asigs,apuntes,
      updated_at:new Date().toISOString()
    };
    const {error}=await sbClient
      .from('unihub_data')
      .upsert(payload,{onConflict:'id'});
    if(error){
      console.error('Save error:',error.message,error.code,error.details);
      showToast('Save error: '+error.message);
      setSyncStatus('error');
    } else {
      setSyncStatus('ok');
    }
  },600);
}

async function loadFromSupabase(){
  if(!currentUser)return;
  showToast('Loading data...');
  const {data,error}=await sbClient
    .from('unihub_data')
    .select('*')
    .eq('id',currentUser.id)
    .single();

  if(error && error.code!=='PGRST116'){
    // PGRST116 = no rows found (first time user)
    console.error('Load error:',error);
    return;
  }

  if(data){
    // Existing user — load saved data
    if(data.asigs    &&data.asigs.length)    asigs=data.asigs;
    if(data.tareas   &&data.tareas.length)   tareas=data.tareas;
    if(data.examenes &&data.examenes.length) examenes=data.examenes;
    if(data.apuntes  &&data.apuntes.length)  apuntes=data.apuntes;
    // Patch year onto asigs if missing (added after initial release)
    asigs.forEach(a=>{
      if(!a.year){
        a.year = ['a1','a2','a3','a4','a5','a6','a7','a8','a9','a10','a11','a12'].includes(a.id) ? 1 : 2;
      }
    });
    // Migrate field names and status values
    const statusMap={'Pendiente':'Pending','Completado':'Completed','Realizado':'Completed'};
    tareas.forEach(t=>{
      if(statusMap[t.estado])t.estado=statusMap[t.estado];
      if(t.grade!==undefined&&t.nota===undefined)t.nota=t.grade;
    });
    examenes.forEach(e=>{
      if(statusMap[e.estado])e.estado=statusMap[e.estado];
      if(e.grade!==undefined&&e.nota===undefined)e.nota=e.grade;
    });
    // Load profile from Supabase if available
    if(data.profile&&Object.keys(data.profile).length){
      const profKey='mc_profile_'+currentUser.id;
      const existing=JSON.parse(localStorage.getItem(profKey)||'{}');
      // Merge: Supabase wins for most fields, keep local if Supabase empty
      const merged={...data.profile,...existing.nombre?{}:{nombre:data.profile.nombre}};
      localStorage.setItem(profKey,JSON.stringify({...data.profile,...existing}));
      localStorage.setItem(profKey,JSON.stringify(data.profile));
    }
    initYearSwitcher();
    loadProfile();
    renderAll();
    setSyncStatus('ok');
  } else {
    // First time — seed defaults and save
    asigs    = ASIGS_DEFAULT.map(a=>({...a}));
    tareas   = TAREAS_DEFAULT.map(t=>({...t}));
    examenes = EXAMENES_DEFAULT.map(e=>({...e}));
    apuntes  = [];
    renderAll();
    const _profKey2='mc_profile_'+currentUser.id;
    const _prof2=JSON.parse(localStorage.getItem(_profKey2)||'{}');
    const {error:saveErr}=await sbClient
      .from('unihub_data')
      .insert({
        id:currentUser.id,
        user_id:currentUser.id,
        asigs,tareas,examenes,apuntes,
        profile:_prof2
      });
    if(saveErr) console.error('First save error:',saveErr);
    else{setSyncStatus('ok');showToast('Welcome to MyCampus');}
  }
}

// Helpers
function gA(id){return asigs.find(a=>a.id===id)||ASIGS_DEFAULT.find(a=>a.id===id)}
function gN(id){const a=gA(id);return a?a.nombre:'—'}
function gC(id){const a=gA(id);return a?a.color:'#9CA3AF'}
function showToast(msg){const t=document.getElementById('toast');t.textContent='✓ '+msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',2400)}

// asigStatus

// ── Active asigs by academic year ────────────────────────────────
function getAcademicYear(){
  try{
    const uid = currentUser?currentUser.id:'guest';
    const prof = JSON.parse(localStorage.getItem('mc_profile_'+uid)||localStorage.getItem('mc_profile')||'{}');
    return parseInt(prof.anio||'1');
  }catch(e){return 1;}
}

function getActiveAsigs(){
  const yr = getAcademicYear();
  // Always use full asig list (ASIGS_DEFAULT merged with stored)
  // Ensure year 2 asigs are always available
  const allAsigs = ASIGS_DEFAULT.map(def => {
    const stored = asigs.find(a => a.id === def.id);
    return stored ? {...def, ...stored, year: def.year} : def;
  });
  const activeYear = allAsigs.filter(a => (a.year||1) === yr);
  if(yr > 1){
    const failedPrev = allAsigs.filter(a => (a.year||1) < yr && asigStatus(a.id).failed);
    return [...activeYear, ...failedPrev];
  }
  return activeYear;
}

function notaVal(n){
  if(n===null||n===undefined||n==='') return null;
  if(typeof n==='string'){
    const s=n.toLowerCase();
    if(s==='pass') return 'pass';
    if(s==='fail') return 'fail';
    if(s==='exemption'||s==='exempt') return 'exemption';
  }
  const f=parseFloat(n);
  return isNaN(f)?null:f;
}
function notaOk(n){const v=notaVal(n);if(v===null)return false;if(v==='pass'||v==='exemption')return true;if(v==='fail')return false;return v>=5.5;}
function notaBad(n){const v=notaVal(n);if(v===null)return false;if(v==='fail')return true;if(v==='pass'||v==='exemption')return false;return typeof v==='number'&&v<5.5;}

function asigStatus(asigId){
  const nota=x=>x.nota!==undefined?x.nota:x.grade; // support both field names
  const exs=examenes.filter(e=>e.asig===asigId&&notaVal(nota(e))!==null);
  const tarsConNota=tareas.filter(t=>t.asig===asigId&&notaVal(nota(t))!==null);
  const tars=tareas.filter(t=>t.asig===asigId);
  const all=[...exs,...tarsConNota];
  if(!all.length)return{approved:false,failed:false,media:null,creditos:0,exsCount:0};
  const allPass=all.every(x=>notaOk(nota(x)));
  const anyFail=all.some(x=>notaBad(nota(x)));
  const allTarDone=tars.length===0||tars.every(t=>t.estado==='Done'||t.estado==='Hecho');
  const nums=all.map(x=>parseFloat(nota(x))).filter(v=>!isNaN(v));
  const media=nums.length?nums.reduce((s,v)=>s+v,0)/nums.length:null;
  const a=gA(asigId);
  const cr=(allPass&&allTarDone)?(+a?.creditos||0):0;
  return{approved:allPass&&allTarDone,failed:anyFail&&!allPass,media,creditos:cr,exsCount:exs.length};
}

function renderPills(sec){
  const cfg=PILL_CFG[sec];if(!cfg)return;

let _dAsigId={ex:null,tar:null};

function selDrawerAsig(type,asigId){
  _dAsigId[type]=asigId;
  const asig=gA(asigId);
  const s1=document.getElementById('d'+type+'-s1');
  const s2=document.getElementById('d'+type+'-s2');
  if(s1)s1.style.display='none';
  if(s2)s2.style.display='block';
  const nameEl=document.getElementById('d'+type+'-asig');
  if(nameEl&&asig)nameEl.innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${asig.color};margin-right:8px;vertical-align:middle"></span>${asig.nombre}`;
  const defaults=type==='ex'?EXAMENES_DEFAULT.filter(e=>e.asig===asigId):TAREAS_DEFAULT.filter(t=>t.asig===asigId);
  const wrap=document.getElementById('d'+type+'-name-wrap');
  const chooser=document.getElementById('d'+type+'-name');
  if(defaults.length>1&&wrap&&chooser){
    chooser.innerHTML=defaults.map(d=>`<option value="${d.id}">${d.nombre}</option>`).join('');
    wrap.style.display='block';
  } else if(wrap){wrap.style.display='none';}
}

function backDrawer(type){
  document.getElementById('d'+type+'-s1').style.display='block';
  document.getElementById('d'+type+'-s2').style.display='none';
  _dAsigId[type]=null;
}

function addExamenDrawer(){
  const asigId=_dAsigId['ex'];if(!asigId)return;
  const defaults=EXAMENES_DEFAULT.filter(e=>e.asig===asigId);
  const chooser=document.getElementById('dex-name');
  let nombre=defaults.length?defaults[0].nombre:'Written exam';
  if(defaults.length>1&&chooser){const s=defaults.find(e=>e.id===chooser.value);if(s)nombre=s.nombre;}
  const conv=document.getElementById('dex-conv')?.value||'';
  const fecha=document.getElementById('dex-fecha')?.value||'';
  examenes.push({id:uid(),asig:asigId,nombre,fecha,hora:'',aula:'',estado:'Not enrolled',nota:null,convocatoria:conv});
  save();closeDrawer();renderAll();showToast('Exam added');
}

function addTareaDrawer(){
  const asigId=_dAsigId['tar'];if(!asigId)return;
  const defaults=TAREAS_DEFAULT.filter(t=>t.asig===asigId);
  const chooser=document.getElementById('dtar-name');
  let nombre=defaults.length?defaults[0].nombre:'Assignment';
  if(defaults.length>1&&chooser){const s=defaults.find(t=>t.id===chooser.value);if(s)nombre=s.nombre;}
  const conv=document.getElementById('dtar-conv')?.value||'';

}

function saveEditTarea(id){
  const t=tareas.find(x=>x.id===id);if(!t)return;
  const gradeType=document.getElementById('edit_grade_'+id)?.value;
  if(gradeType===''||gradeType===undefined) t.nota=null;
  else if(gradeType==='pass') t.nota='pass';
  else if(gradeType==='fail') t.nota='fail';
  else if(gradeType==='exemption') t.nota='exemption';
  else if(gradeType==='num'){
    const num=parseFloat(document.getElementById('edit_grade_num_t_'+id)?.value);
    if(!isNaN(num)&&num>=0&&num<=10) t.nota=num;
  }
  const est=document.getElementById('edit_est_'+id)?.value;if(est)t.estado=est;
  const conv=document.getElementById('edit_conv_t_'+id)?.value;if(conv!==undefined)t.convocatoria=conv;
  const fechaT=document.getElementById('edit_fecha_t_'+id)?.value;if(fechaT!==undefined)t.fecha=fechaT;
  save();closeEdit(id);renderAll();showToast('Assignment updated');
}
function saveEditExamen(id){
  const e=examenes.find(x=>x.id===id);if(!e)return;
  const notaType=document.getElementById('edit_grade_'+id)?.value;
  if(notaType===''||notaType===undefined) e.nota=null;
  else if(notaType==='pass') e.nota='pass';
  else if(notaType==='fail') e.nota='fail';
  else if(notaType==='exemption') e.nota='exemption';
  else if(notaType==='num'){
    const num=parseFloat(document.getElementById('edit_grade_num_'+id)?.value);
    if(!isNaN(num)&&num>=0&&num<=10) e.nota=num;
  }
  if(e.nota!==null&&e.nota!==undefined) e.estado='Completed';
  const est=document.getElementById('edit_est_'+id)?.value;if(est)e.estado=est;
  const convE=document.getElementById('edit_conv_'+id)?.value;if(convE!==undefined)e.convocatoria=convE;
  const fechaE=document.getElementById('edit_fecha_e_'+id)?.value;if(fechaE!==undefined)e.fecha=fechaE;
  save();closeEdit(id);renderAll();showToast('Exam updated');
}

function renderOvStats(){
  const activeAsigs=getActiveAsigs();
  let totalAp=0,totalCr=0;
  const TOTAL_CR=activeAsigs.reduce((s,a)=>s+(+a.creditos||0),0);
  activeAsigs.forEach(a=>{const st=asigStatus(a.id);if(st.approved){totalAp++;totalCr+=+a.creditos||0;}});
  const pct=TOTAL_CR>0?Math.round(totalCr/TOTAL_CR*100):0;
  const apEl=document.getElementById('ov-ap-num');
  if(apEl)apEl.innerHTML=`${totalAp}<span style="font-size:22px;font-weight:400;color:rgba(255,255,255,.6)"> /${activeAsigs.length}</span>`;
  const apSub=document.getElementById('ov-ap-sub');
  if(apSub)apSub.textContent=totalAp===asigs.length?'All passed!':totalAp===0?'None passed yet':`${asigs.length-totalAp} pending${asigs.length-totalAp!==1?'s':''}`;
  const crEl=document.getElementById('ov-cr-num');
  if(crEl)crEl.innerHTML=`${totalCr}<span style="font-size:22px;font-weight:400;color:rgba(255,255,255,.6)"> /${TOTAL_CR}</span>`;
  const bar=document.getElementById('ov-cr-bar');
  if(bar)setTimeout(()=>bar.style.width=pct+'%',80);
  const pctEl=document.getElementById('ov-cr-pct');
  if(pctEl)pctEl.textContent=pct+'% of total';
  // Render path using ALL credits (both years)
  let totalEarned=0;
  ASIGS_DEFAULT.forEach(a=>{const st=asigStatus(a.id);if(st.approved)totalEarned+=+a.creditos||0;});
  renderPath(totalEarned);
}

function renderPath(earned){
  const TOTAL=120;
  const pct=Math.min(100,Math.round(earned/TOTAL*100));
  const fill=document.getElementById('ov-path-fill');
  if(fill)setTimeout(()=>fill.style.width=pct+'%',120);
  const ms=document.getElementById('ov-path-milestones');
  if(ms){
    const milestones=[
      {ec:0,label:'Start'},
      {ec:30,label:'Sem 1'},
      {ec:60,label:'Year 1'},
      {ec:90,label:'Sem 3'},
      {ec:120,label:'Year 2'},
    ];
    ms.innerHTML=milestones.map(m=>{
      const pos=Math.round(m.ec/TOTAL*100);
      const reached=earned>=m.ec;
      return`<div class="ov-path-ms" style="left:${pos}%;top:50%;transform:translate(-50%,-50%)">
        <div class="ov-path-ms-dot${reached?' reached':''}">${reached&&m.ec>0?'✓':m.ec===0?'▶':''}</div>
      </div>
      <div class="ov-path-ms" style="left:${pos}%;top:100%;transform:translateX(-50%)">
        <div class="ov-path-ms-label${reached?' reached':''}">${m.label}</div>
      </div>`;
    }).join('');
  }
  const st=document.getElementById('ov-path-text');
  if(st)st.textContent=earned+' / '+TOTAL+' EC · '+pct+'% complete';
}

// STUDY ROUTE
function renderStudyRoute(){
  const el=document.getElementById('sr-grid');if(!el)return;
  el.innerHTML=STUDY_ROUTE.map(yr=>{
    const semsHtml=yr.semesters.map(sem=>{
      const coursesHtml=sem.courses.map(course=>{
        const asig=asigs.find(a=>a.id===course.id);
        const col=asig?asig.color:(course.color||'#6B7280');
        let bgColor='linear-gradient(135deg,#EFF6FF 0%,#F8FAFF 100%)';
        let borderColor='#DBEAFE';
        let nameColor='var(--text)';
        if(asig&&(course.status==='Completed'||course.status==='Completado')){
          const st=asigStatus(asig.id);
          if(st.approved){bgColor='linear-gradient(135deg,#ECFDF3 0%,#F0FDF4 100%)';borderColor='#86EFAC';nameColor='#14532D';}
          else if(st.failed){bgColor='linear-gradient(135deg,#FEF2F2 0%,#FFF5F5 100%)';borderColor='#FCA5A5';nameColor='#7F1D1D';}
        }
        // Get exams and tareas for this course
        const courseId=course.id;
        // Include defaults for items not yet saved to Supabase (year 2)
        const storedExs=asig?examenes.filter(e=>e.asig===asig.id):[];
        const defaultExs=asig?EXAMENES_DEFAULT.filter(e=>e.asig===asig.id&&!storedExs.find(x=>x.id===e.id)):[];
        const courseExs=[...storedExs,...defaultExs];
        const storedTars=asig?tareas.filter(t=>t.asig===asig.id):[];
        const defaultTars=asig?TAREAS_DEFAULT.filter(t=>t.asig===asig.id&&!storedTars.find(x=>x.id===t.id)):[];
        const courseTars=[...storedTars,...defaultTars];
        const hasItems=courseExs.length>0||courseTars.length>0;

        const exRows=courseExs.map(e=>{
          const hasN=e.nota!==null&&e.nota!==undefined&&e.nota!=='';
          const gv=e.nota!==undefined?e.nota:e.nota;const pass=hasN&&(gv==='pass'||gv==='exemption'||(parseFloat(gv)>=5.5));
          const gradeEl=hasN?`<span style="font-size:11px;font-weight:700;color:${pass?'#12B76A':'#F04438'}">${typeof gv==='number'?gv.toFixed(1):(gv==='pass'?'Pass':gv==='exemption'?'Exempt':gv==='fail'?'Fail':parseFloat(gv).toFixed(1))}</span>`:`<span style="font-size:10px;color:var(--sub2)">${e.estado}</span>`;
          return`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)">
            <span style="font-size:11px;color:var(--text);font-weight:500">${e.nombre}</span>
            ${gradeEl}
          </div>`;
        }).join('');

        const tarRows=courseTars.map(t=>{
          const hasN=t.nota!==null&&t.nota!==undefined&&t.nota!=='';
          const tv=t.nota!==undefined?t.nota:t.nota;const pass=hasN&&(tv==='pass'||tv==='exemption'||(parseFloat(tv)>=5.5));
          const gradeEl=hasN?`<span style="font-size:11px;font-weight:700;color:${pass?'#12B76A':'#F04438'}">${typeof tv==='number'?tv.toFixed(1):(tv==='pass'?'Pass':tv==='exemption'?'Exempt':tv==='fail'?'Fail':parseFloat(tv).toFixed(1))}</span>`:`<span style="font-size:10px;color:var(--sub2)">${t.estado}</span>`;
          return`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06)">
            <span style="font-size:11px;color:var(--text);font-weight:500">${t.nombre}</span>
            ${gradeEl}
          </div>`;
        }).join('');

        const dropdown=hasItems?`<div id="srd_${courseId}" style="display:none;padding:8px 10px 4px;border-top:1px solid rgba(0,0,0,.08);margin-top:6px">
          ${courseExs.length?`<div style="font-size:9px;font-weight:700;color:var(--sub2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Exams</div>${exRows}`:''}
          ${courseTars.length?`<div style="font-size:9px;font-weight:700;color:var(--sub2);text-transform:uppercase;letter-spacing:.08em;margin:${courseExs.length?'8px':0} 0 4px">Assignments</div>${tarRows}`:''}
        </div>`:'';

        const chevron=hasItems?`<svg id="srchev_${courseId}" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;transition:transform .2s;color:var(--sub2)"><polyline points="6 9 12 15 18 9"/></svg>`:'';
        const clickable=hasItems?`onclick="toggleSRCourse('${courseId}')" style="cursor:pointer"`:'';

        return`<div class="sr-course" style="background:${bgColor};border-color:${borderColor}">
          <div class="sr-course-bar" style="background:${col}"></div>
          <div class="sr-course-body" style="padding-bottom:${hasItems?'6px':'9px'}">
            <div style="display:flex;align-items:center;justify-content:space-between" ${clickable}>
              <div>
                <div class="sr-course-name" style="color:${nameColor}">${course.nombre}</div>
                <div class="sr-course-ec">${course.ec} EC</div>
              </div>
              ${chevron}
            </div>
            ${dropdown}
          </div>
        </div>`;
      }).join('');
      return`<div class="sr-sem"><div class="sr-sem-label">${sem.label}</div>${coursesHtml}</div>`;
    }).join('');
    const totalCourses=yr.semesters.reduce((s,sem)=>s+sem.courses.length,0);
    const totalDoneEC=yr.semesters.reduce((s,sem)=>s+sem.courses.reduce((ss,c)=>ss+c.ec,0),0);
    return`<div class="sr-year"><div class="sr-year-head"><div style="display:flex;align-items:center;gap:8px"><span class="sr-year-title">${yr.year}</span><span style="background:var(--bg);color:var(--sub);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px">${totalCourses}</span></div><span class="sr-year-ec">${totalDoneEC} EC</span></div>${semsHtml}<div style="height:8px"></div></div>`;
  }).join('');
}

const PROFILE_KEY='mc_profile';

  }catch(e){}

function updateAvatarDisplay(p){
  const mobAv=document.getElementById('mob-avatar');
  const initials2=p.nombre?p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase():'VC';
  if(mobAv)mobAv.textContent=initials2;
  const initials=p.nombre?p.nombre.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase():'VC';
  const av=document.getElementById('main-avatar');
  const ppAv=document.getElementById('pp-avatar');
  if(av) av.textContent=initials;
  if(ppAv) ppAv.textContent=initials;
  const nameHead=document.getElementById('pp-name-head');
  if(nameHead) nameHead.textContent=p.nombre||'My profile';
  const emailHead=document.getElementById('pp-email-head');
  if(emailHead&&currentUser) emailHead.textContent=currentUser.email||'';
}

function saveProfile(){
  const prevYear=getAcademicYear();
  const p={
    nombre:document.getElementById('pf-nombre').value.trim(),
    email:document.getElementById('pf-email').value.trim(),
    studentid:document.getElementById('pf-studentid').value.trim(),
    grado:document.getElementById('pf-grado').value.trim(),
    anio:document.getElementById('pf-anio').value,
  };
  const userKey='mc_profile_'+(currentUser?currentUser.id:'guest');
localStorage.setItem(userKey,JSON.stringify(p));
localStorage.setItem(PROFILE_KEY,JSON.stringify(p));
  updateAvatarDisplay(p);
  closeProfile();
  showToast('Profile saved');
}

function toggleProfile(e){
  e.stopPropagation();
  const panel=document.getElementById('profile-panel');
  const isOpen=panel.classList.contains('open');
  if(!isOpen){
    loadProfile();
    // Update email from current user
    if(currentUser){
      const eh=document.getElementById('pp-email-head');
      if(eh) eh.textContent=currentUser.email||'';
    }
  }
  panel.classList.toggle('open');
}

function closeProfile(){
  document.getElementById('profile-panel')?.classList.remove('open');
}

document.addEventListener('click',e=>{
  const panel=document.getElementById('profile-panel');
  if(panel&&!panel.contains(e.target)&&e.target.id!=='main-avatar'){
    panel.classList.remove('open');
  }
});

async function doLogout(){
  await sbClient.auth.signOut();
  closeProfile();

}

async function debugSupabase(){
  const {data,error} = await sbClient.from('unihub_data').select('*').eq('id',currentUser.id).single();
  if(error) showToast('Error: '+error.message+' code:'+error.code);

function switchYear(yr){
  yr=parseInt(yr);
  // Save to profile
  try{
    const uid=currentUser?currentUser.id:'guest';
    const key='mc_profile_'+uid;
    const prof=JSON.parse(localStorage.getItem(key)||'{}');
    prof.anio=String(yr);
    localStorage.setItem(key,JSON.stringify(prof));
  }catch(e){}
  // Update profile panel dropdown
  const pfAnio=document.getElementById('pf-anio');
  if(pfAnio)pfAnio.value=String(yr);
  // Re-render
  renderAll();
  showToast('Switched to Year '+yr);
}

function initYearSwitcher(){
  const yr=getAcademicYear();
  const sel=document.getElementById('year-switcher');
  if(sel)sel.value=String(yr);
}


let _drawerAsigId = {ex:null, tar:null};

function selectDrawerAsig(type, asigId){
  _drawerAsigId[type] = asigId;
  const asig = gA(asigId);
  const step1 = document.getElementById('drawer-'+type+'-step1');
  const step2 = document.getElementById('drawer-'+type+'-step2');
  if(step1) step1.style.display='none';
  if(step2) step2.style.display='block';

  // Set subject name
  const nameEl = document.getElementById('drawer-'+type+'-asig-name');
  if(nameEl && asig){
    nameEl.innerHTML=`<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${asig.color};margin-right:8px"></span>${asig.nombre}`;
  }

  // Check if multiple exams/assignments for this subject
  if(type==='ex'){
    const exams = EXAMENES_DEFAULT.filter(e=>e.asig===asigId);
    const wrap = document.getElementById('drawer-ex-name-wrap');
    const chooser = document.getElementById('exn-chooser');
    if(exams.length>1 && wrap && chooser){
      chooser.innerHTML = exams.map(e=>`<option value="${e.id}">${e.nombre}</option>`).join('');
      wrap.style.display='block';
    } else if(wrap){
      wrap.style.display='none';
    }
  } else {
    const assignments = TAREAS_DEFAULT.filter(t=>t.asig===asigId);
    const wrap = document.getElementById('drawer-tar-name-wrap');
    const chooser = document.getElementById('tn-chooser');
    if(assignments.length>1 && wrap && chooser){
      chooser.innerHTML = assignments.map(t=>`<option value="${t.id}">${t.nombre}</option>`).join('');
      wrap.style.display='block';
    } else if(wrap){
      wrap.style.display='none';
    }
  }
}

function backDrawerStep(type){
  document.getElementById('drawer-'+type+'-step1').style.display='block';
  document.getElementById('drawer-'+type+'-step2').style.display='none';
  _drawerAsigId[type]=null;
}

function addExamenFromDrawer(){
  const asigId=_drawerAsigId['ex'];
  if(!asigId){showToast('Select a subject');return;}
  const exams=EXAMENES_DEFAULT.filter(e=>e.asig===asigId);
  const chooser=document.getElementById('exn-chooser');
  let examName='Written exam';
  if(exams.length===1) examName=exams[0].nombre;
  else if(chooser){
    const sel=exams.find(e=>e.id===chooser.value);
    if(sel)examName=sel.nombre;
  }
  const conv=document.getElementById('exconv')?.value||'';
  const fecha=document.getElementById('exfecha')?.value||'';
  examenes.push({id:uid(),asig:asigId,nombre:examName,fecha,hora:'',aula:'',estado:'Not enrolled',nota:null,convocatoria:conv});
  save();closeDrawer();renderAll();showToast('Exam added');
}

function addTareaFromDrawer(){
  const asigId=_drawerAsigId['tar'];
  if(!asigId){showToast('Select a subject');return;}
  const assignments=TAREAS_DEFAULT.filter(t=>t.asig===asigId);
  const chooser=document.getElementById('tn-chooser');
  let name='Assignment';
  if(assignments.length===1) name=assignments[0].nombre;
  else if(chooser){
    const sel=assignments.find(t=>t.id===chooser.value);
    if(sel)name=sel.nombre;
  }
  const conv=document.getElementById('tconv')?.value||'';
  const fecha=document.getElementById('tfecha')?.value||'';
  tareas.push({id:uid(),asig:asigId,nombre:name,fecha,tipo:'Assignment',estado:'Pending',nota:null,convocatoria:conv});
  save();closeDrawer();renderAll();showToast('Assignment added');
}

function toggleSRCourse(id){
  const el=document.getElementById('srd_'+id);
  const chev=document.getElementById('srchev_'+id);
  if(!el)return;
  const open=el.style.display==='none';
  el.style.display=open?'block':'none';
  if(chev)chev.style.transform=open?'rotate(180deg)':'rotate(0deg)';
}


function renderOvPath(){
  const el=document.getElementById('ov-path-track');
  const lbl=document.getElementById('ov-path-label');
  if(!el)return;

  const TOTAL_ALL=240;
  let earnedAll=0;
  ASIGS_DEFAULT.forEach(a=>{
    const st=asigStatus(a.id);
    if(st.approved) earnedAll+=(+a.creditos||0);
  });
  const pctAll=Math.round(earnedAll/TOTAL_ALL*100);

  // Bar chart: one bar per year, showing credits earned vs total
  const years=[
    {label:'Year 1',total:60,earned:0,color:'#1D4ED8'},
    {label:'Year 2',total:60,earned:0,color:'#3B82F6'},
    {label:'Year 3',total:60,earned:0,color:'#60A5FA'},
    {label:'Year 4',total:60,earned:0,color:'#93C5FD'},
  ];

  // Count earned per year
  ASIGS_DEFAULT.forEach(a=>{
    const st=asigStatus(a.id);
    if(st.approved){
      const yr=(a.year||1)-1;
      const yrIdx=(a.year||1)-1;
    if(years[yrIdx]) years[yrIdx].earned+=(+a.creditos||0);
    }
  });

  el.innerHTML=`
    <div style="display:flex;gap:16px;align-items:flex-end;height:100%;width:100%">
      ${years.map(yr=>{
        const pct=Math.round(yr.earned/yr.total*100);
        const barH=Math.max(pct,2);
        return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end">
          <div style="font-size:11px;font-weight:700;color:${yr.color}">${yr.earned}/${yr.total}</div>
          <div style="width:100%;background:#EFF6FF;border-radius:8px;overflow:hidden;flex:1;display:flex;align-items:flex-end">
            <div style="width:100%;height:${barH}%;background:${yr.color};border-radius:8px;transition:height .8s cubic-bezier(.34,1.56,.64,1);min-height:4px"></div>
          </div>
          <div style="font-size:11px;font-weight:600;color:var(--sub)">${yr.label}</div>
          <div style="font-size:10px;color:var(--sub2)">${pct}% done</div>
        </div>`;
      }).join('')}
    </div>
  `;

  if(lbl)lbl.textContent=`${earnedAll} / ${TOTAL_ALL} EC · ${pctAll}% complete`;
}

function renderAll(){
  renderOvStats();renderOvActividades();renderOvPath();
  renderExamenes();
  renderStudyRoute();
}

document.addEventListener('DOMContentLoaded', function(){
  // Restore sidebar
  (function(){
    const saved=localStorage.getItem('mc_sidebar_expanded');
    if(saved==='1'){
      const sb=document.getElementById('sidebar');
      if(sb){
        sb.classList.add('expanded');
        const icon=document.getElementById('sb-toggle-icon');
        if(icon) icon.querySelector('polyline').setAttribute('points','15 18 9 12 15 6');
      }
    }
  })();
  loadProfile();
  initYearSwitcher();
  
  document.querySelector('.topbar')?.classList.add('hidden');
  renderAll();
  sbClient.auth.getSession().then(({data:{session}})=>{
    const guard=document.getElementById('auth-guard');
    if(session){
      if(guard)guard.style.display='none';
      onLogin(session);
    } else {
      window.location.href='index.html';
    }
  });
});

// ── Activity timeout (10 min) ─────────────────────────────────────
const TIMEOUT_MS=10*60*1000;
const LAST_ACTIVE_KEY='mc_last_active';
function updateActivity(){localStorage.setItem(LAST_ACTIVE_KEY,Date.now().toString());}
function checkActivity(){
  const last=parseInt(localStorage.getItem(LAST_ACTIVE_KEY)||'0');
  if(last&&Date.now()-last>TIMEOUT_MS){
    sbClient.auth.signOut();
    window.location.href='index.html';
  }
}
['click','keydown','scroll','touchstart'].forEach(ev=>document.addEventListener(ev,updateActivity,{passive:true}));
setInterval(checkActivity,60*1000);
updateActivity();
